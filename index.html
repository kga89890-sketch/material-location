<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Data Viewer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-stone-50 text-stone-900 p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-stone-900">ERP Data Viewer</h1>
                <p class="text-stone-500 text-sm mt-1">실시간 데이터 조회 시스템 (Static Mode)</p>
            </div>
        </header>

        <!-- Search -->
        <div class="flex flex-col md:flex-row gap-3">
            <div class="md:w-48 relative">
                <select id="searchColumn" class="block w-full h-full px-4 py-3 md:py-0 border border-stone-200 rounded-2xl bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-base md:text-sm appearance-none cursor-pointer">
                    <option value="all">전체 검색</option>
                    <option value="LOCATION">LOCATION</option>
                    <option value="ERP_NO">ERP_NO</option>
                    <option value="NAME">NAME</option>
                    <option value="ERP_SPEC">ERP_SPEC</option>
                    <option value="LABEL_SPEC">LABEL_SPEC</option>
                    <option value="Maker">Maker</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-stone-400">
                    <i data-lucide="chevron-down" size="18"></i>
                </div>
            </div>
            <div class="relative group flex-1">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="search" size="18" class="text-stone-400 group-focus-within:text-indigo-500 transition-colors"></i>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="검색 후 Enter로 필터 추가..."
                    class="block w-full pl-11 pr-12 py-4 border border-stone-200 rounded-2xl bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-base md:text-sm"
                />
                <div class="absolute inset-y-0 right-0 pr-2 flex items-center gap-1">
                    <button id="clearSearch" class="p-2 text-stone-400 hover:text-stone-600 active:scale-90 transition-all hidden">
                        <i data-lucide="x" size="18"></i>
                    </button>
                    <button id="addFilterBtn" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 active:scale-95 transition-all mr-1" title="필터 추가">
                        <i data-lucide="plus" size="18"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Active Filters Chips -->
        <div id="filterChips" class="flex flex-wrap gap-2 hidden">
            <!-- Chips will be injected here -->
        </div>

        <!-- Table/Card Area -->
        <div class="bg-white border border-stone-200 rounded-2xl shadow-sm overflow-hidden">
            <!-- Desktop Table View -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50 border-b border-stone-200">
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">LOCATION</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">ERP_NO</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">NAME</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">ERP_SPEC</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">LABEL_SPEC</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">Maker</th>
                            <th class="px-4 py-3 text-xs font-bold text-stone-500 uppercase tracking-wider">moq</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-stone-100">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Mobile Card View -->
            <div id="cardView" class="md:hidden divide-y divide-stone-100">
                <!-- Cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/20 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all scale-95 opacity-0" id="modalContent">
            <div class="px-6 py-4 border-b border-stone-100 flex items-center justify-between bg-stone-50">
                <div class="flex items-center gap-2">
                    <div class="p-2 bg-indigo-50 rounded-lg">
                        <i data-lucide="info" size="20" class="text-indigo-600"></i>
                    </div>
                    <h2 class="text-lg font-bold text-stone-900">상세 정보</h2>
                </div>
                <button id="closeModal" class="p-1 hover:bg-stone-200 rounded-full transition-colors">
                    <i data-lucide="x" size="20"></i>
                </button>
            </div>
            <div class="p-5 space-y-4 max-h-[60vh] md:max-h-[70vh] overflow-y-auto" id="modalBody">
                <!-- Detail items will be injected here -->
            </div>
            <div class="px-6 py-4 bg-stone-50 text-right">
                <button id="closeModalBtn" class="px-6 py-2 bg-stone-900 text-white rounded-lg font-medium hover:bg-stone-800 transition-colors">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let filters = [];
        let searchTerm = "";

        const searchInput = document.getElementById('searchInput');
        const searchColumn = document.getElementById('searchColumn');
        const tableBody = document.getElementById('tableBody');
        const cardView = document.getElementById('cardView');
        const filterChips = document.getElementById('filterChips');
        const clearSearch = document.getElementById('clearSearch');
        const addFilterBtn = document.getElementById('addFilterBtn');
        const detailModal = document.getElementById('detailModal');
        const modalContent = document.getElementById('modalContent');
        const modalBody = document.getElementById('modalBody');

        // Initialize Lucide icons
        lucide.createIcons();

        // Fetch Data
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to fetch data.json');
                allData = await response.json();
                render();
            } catch (error) {
                console.error('Error loading data:', error);
                tableBody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center text-rose-500">데이터를 불러오는 데 실패했습니다. (data.json 파일을 확인해주세요)</td></tr>`;
                cardView.innerHTML = `<div class="px-4 py-12 text-center text-rose-500">데이터를 불러오는 데 실패했습니다.</div>`;
            }
        }

        function render() {
            const q = searchTerm.trim().toLowerCase();
            let result = [...allData];

            // Apply active filters (AND logic)
            if (filters.length > 0) {
                result = result.filter(row => {
                    return filters.every(filter => {
                        if (filter.column === 'all') {
                            return Object.values(row).some(val => 
                                String(val).toLowerCase().includes(filter.value.toLowerCase())
                            );
                        } else {
                            const val = row[filter.column];
                            return (val ? String(val) : '').toLowerCase().includes(filter.value.toLowerCase());
                        }
                    });
                });
            }

            // Apply current search term
            if (q) {
                const col = searchColumn.value;
                result = result.filter(row => {
                    if (col !== 'all') {
                        const val = row[col];
                        return (val ? String(val) : '').toLowerCase().includes(q);
                    }
                    return Object.values(row).some(val => 
                        String(val).toLowerCase().includes(q)
                    );
                });
            }

            // Render Table
            if (result.length > 0) {
                tableBody.innerHTML = result.map((row, idx) => `
                    <tr class="hover:bg-indigo-50/50 cursor-pointer transition-colors" onclick="showDetail(${idx}, 'table')">
                        <td class="px-4 py-4 text-sm font-medium text-stone-900 whitespace-nowrap">${row.LOCATION || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 whitespace-nowrap font-mono">${row.ERP_NO || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 min-w-[200px]">${row.NAME || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 whitespace-nowrap">${row.ERP_SPEC || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 whitespace-nowrap">${row.LABEL_SPEC || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 whitespace-nowrap">${row.Maker || ''}</td>
                        <td class="px-4 py-4 text-sm text-stone-600 whitespace-nowrap">${row.moq ? row.moq.toLocaleString() : ''}</td>
                    </tr>
                `).join('');

                cardView.innerHTML = result.map((row, idx) => `
                    <div class="p-4 active:bg-stone-100 cursor-pointer transition-colors space-y-2" onclick="showDetail(${idx}, 'card')">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded uppercase tracking-wider">${row.LOCATION || ''}</span>
                            <span class="text-xs font-mono text-stone-400">${row.ERP_NO || ''}</span>
                        </div>
                        <h3 class="text-sm font-semibold text-stone-900 leading-tight">${row.NAME || 'No Name'}</h3>
                        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-stone-500">
                            <div class="flex items-center gap-1"><span class="font-bold text-stone-400">SPEC:</span><span>${row.ERP_SPEC || '-'}</span></div>
                            <div class="flex items-center gap-1"><span class="font-bold text-stone-400">LABEL:</span><span>${row.LABEL_SPEC || '-'}</span></div>
                            <div class="flex items-center gap-1"><span class="font-bold text-stone-400">Maker:</span><span>${row.Maker || '-'}</span></div>
                            <div class="flex items-center gap-1"><span class="font-bold text-stone-400">MOQ:</span><span>${row.moq ? row.moq.toLocaleString() : '0'}</span></div>
                        </div>
                    </div>
                `).join('');
            } else {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center text-stone-400">검색 결과가 없습니다.</td></tr>`;
                cardView.innerHTML = `<div class="px-4 py-12 text-center text-stone-400">검색 결과가 없습니다.</div>`;
            }

            // Store result for detail view
            window.currentResult = result;

            // Render Chips
            if (filters.length > 0) {
                filterChips.classList.remove('hidden');
                filterChips.innerHTML = filters.map(f => `
                    <div class="flex items-center gap-1.5 bg-indigo-600 text-white px-3 py-1.5 rounded-full text-xs font-medium shadow-sm">
                        <span class="opacity-70">${f.column === 'all' ? '전체' : f.column}:</span>
                        <span>${f.value}</span>
                        <button onclick="removeFilter('${f.id}')" class="hover:bg-white/20 rounded-full p-0.5 transition-colors">
                            <i data-lucide="x" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                `).join('') + `
                    <button onclick="clearAllFilters()" class="text-xs font-bold text-stone-400 hover:text-stone-600 px-2 py-1.5 transition-colors">모두 지우기</button>
                `;
                lucide.createIcons();
            } else {
                filterChips.classList.add('hidden');
            }
        }

        function addFilter() {
            const val = searchInput.value.trim();
            if (!val) return;
            filters.push({
                id: Math.random().toString(36).substr(2, 9),
                column: searchColumn.value,
                value: val
            });
            searchInput.value = "";
            clearSearch.classList.add('hidden');
            render();
        }

        window.removeFilter = (id) => {
            filters = filters.filter(f => f.id !== id);
            render();
        };

        window.clearAllFilters = () => {
            filters = [];
            render();
        };

        window.showDetail = (idx) => {
            const row = window.currentResult[idx];
            modalBody.innerHTML = Object.entries(row).map(([key, value]) => `
                <div class="flex flex-col border-b border-stone-50 pb-3 last:border-0">
                    <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">${key}</span>
                    <span class="text-sm md:text-base text-stone-800 break-words font-medium">
                        ${typeof value === 'object' ? JSON.stringify(value) : String(value)}
                    </span>
                </div>
            `).join('');
            
            detailModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        function closeDetail() {
            modalContent.classList.add('scale-95', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                detailModal.classList.add('hidden');
            }, 200);
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            if (searchTerm) {
                clearSearch.classList.remove('hidden');
            } else {
                clearSearch.classList.add('hidden');
            }
            render();
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addFilter();
        });

        clearSearch.addEventListener('click', () => {
            searchInput.value = "";
            searchTerm = "";
            clearSearch.classList.add('hidden');
            render();
        });

        addFilterBtn.addEventListener('click', addFilter);
        document.getElementById('closeModal').addEventListener('click', closeDetail);
        document.getElementById('closeModalBtn').addEventListener('click', closeDetail);
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) closeDetail();
        });

        // Initial Load
        loadData();
    </script>
</body>
</html>
